<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Book -->
  <g transform="translate(20, 20)">
    <!-- Left page -->
    <rect x="0" y="0" width="25" height="35" fill="#3B82F6" rx="2"/>
    <!-- Right page -->
    <rect x="25" y="0" width="25" height="35" fill="#1E40AF" rx="2"/>
    <!-- Spine -->
    <rect x="23" y="0" width="4" height="35" fill="#1E3A8A" rx="1"/>
    <!-- Book lines on left -->
    <line x1="5" y1="8" x2="20" y2="8" stroke="#E0E7FF" stroke-width="1"/>
    <line x1="5" y1="14" x2="20" y2="14" stroke="#E0E7FF" stroke-width="1"/>
    <line x1="5" y1="20" x2="20" y2="20" stroke="#E0E7FF" stroke-width="1"/>
    <line x1="5" y1="26" x2="18" y2="26" stroke="#E0E7FF" stroke-width="1"/>
    <!-- Book lines on right -->
    <line x1="30" y1="8" x2="45" y2="8" stroke="#E0E7FF" stroke-width="1"/>
    <line x1="30" y1="14" x2="45" y2="14" stroke="#E0E7FF" stroke-width="1"/>
    <line x1="30" y1="20" x2="45" y2="20" stroke="#E0E7FF" stroke-width="1"/>
    <line x1="30" y1="26" x2="43" y2="26" stroke="#E0E7FF" stroke-width="1"/>
  </g>
  
  <!-- Decorative circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
</svg>
